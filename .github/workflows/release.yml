name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create GitHub release
      packages: write       # push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history for changelog

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV}..HEAD"
          fi

          # Build changelog from commits
          CHANGELOG=$(git log $RANGE --pretty=format:"- %s" --no-merges | grep -v "^- chore:" | head -50)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Various improvements and bug fixes"
          fi

          # Write to file (multiline safe)
          {
            echo "## What's new in ${{ github.ref_name }}"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "## Docker"
            echo '```bash'
            echo "docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
            echo "# or always latest:"
            echo "docker pull ghcr.io/${{ github.repository }}:latest"
            echo '```'
            echo ""
            echo "## Quick start"
            echo '```bash'
            echo "git clone https://github.com/${{ github.repository }}"
            echo "cd grimport"
            echo "cp .env.example .env"
            echo "docker compose up -d"
            echo '```'
          } > CHANGELOG.md

          cat CHANGELOG.md

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./supervisor
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
