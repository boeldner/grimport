<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grimport — Sign in</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none'%3E%3Crect x='2' y='2' width='4' height='12' rx='1.5' fill='%23b91c1c'/%3E%3Crect x='10' y='4' width='4' height='10' rx='1.5' fill='%23b91c1c'/%3E%3Crect x='2' y='2' width='12' height='3' rx='1.5' fill='%23b91c1c'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .login-wrap {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      padding: 20px;
    }

    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }
    .login-brand-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text);
    }
    .login-brand-sub {
      font-size: 13px;
      color: var(--text-muted);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border-hi);
      border-radius: var(--radius-xl);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 24px 48px rgba(0,0,0,0.5);
    }

    .login-card form { gap: 14px; }
    .login-card .btn { width: 100%; padding: 9px; font-size: 14px; }

    .login-error {
      color: var(--red);
      font-size: 13px;
      padding: 8px 11px;
      background: var(--red-dim);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: var(--radius);
      display: none;
    }
    .login-error.visible { display: block; }

    .login-footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-subtle);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="36" height="36" fill="none" aria-hidden="true">
        <rect x="3" y="3" width="4" height="14" rx="1.5" fill="#b91c1c"/>
        <rect x="13" y="5" width="4" height="12" rx="1.5" fill="#b91c1c"/>
        <rect x="3" y="3" width="14" height="3" rx="1.5" fill="#b91c1c"/>
      </svg>
      <div>
        <div class="login-brand-name">Grimport</div>
        <div class="login-brand-sub">Static site hosting panel</div>
      </div>
    </div>

    <div class="login-card">
      <form id="login-form">
        <label>Username
          <input type="text" name="username" id="username-input"
            autocomplete="username" required autofocus
            placeholder="admin" />
        </label>
        <label>Password
          <input type="password" name="password" id="password-input"
            autocomplete="current-password" required
            placeholder="Enter your password" />
        </label>
        <p class="login-error" id="login-error"></p>
        <button type="submit" class="btn btn-primary" id="btn-login">Sign in</button>
      </form>
    </div>

    <div class="login-footer">Grimport v0.7.0</div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.classList.remove('visible');
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username-input').value.trim(),
            password: document.getElementById('password-input').value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          err.textContent = data.error || 'Sign in failed';
          err.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      } catch {
        err.textContent = 'Network error — is the server running?';
        err.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
